services:
  db18:
    image: postgres:16
    container_name: integ18-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    tmpfs:
      - /var/lib/postgresql/data

  rabbitmq18:
    image: rabbitmq:3-management
    container_name: integ18-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10

  odoo18:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        ODOO_VERSION: "18.0"
    container_name: integ18-web
    depends_on:
      db18:
        condition: service_started
      rabbitmq18:
        condition: service_healthy
    ports:
      - "18069:8069"
    environment:
      HOST: db18
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./odoo_connector_rabbitmq:/mnt/extra-addons/odoo_connector_rabbitmq
    command: >
      odoo
      --db_host=db18 --db_user=odoo --db_password=odoo
      -d integ18 -i odoo_connector_rabbitmq
      --without-demo=all
